version: '3.8'

services:
  # ===========================================
  # Nginx Reverse Proxy with SSL Termination
  # ===========================================
  nginx-proxy:
    image: nginx:1.25-alpine
    container_name: warehouse-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx-proxy/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx-proxy/logrotate.conf:/etc/logrotate.d/nginx:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - warehouse-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
  # ===========================================
  # Laravel Application
  # ===========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehouse-app
    restart: unless-stopped
    # Remove port mapping - traffic goes through nginx-proxy
    expose:
      - "80"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - APP_NAME=Warehouse Maintenance
      - APP_ENV=production
      - APP_KEY=${APP_KEY:-base64:vlbgy3dM01TbMX3KnZ0hNBPJCQ4ft2+Q85Q0HGQ0TVQ=}
      - APP_DEBUG=false
      - APP_URL=https://warehouse-maintenance.gdn-app.com
      - APP_TIMEZONE=Asia/Jakarta
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-warehouse_maintenance}
      - DB_USERNAME=${DB_USERNAME:-warehouse_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - CENTRAL_DB_DATABASE=${CENTRAL_DB_DATABASE:-warehouse_central}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp.office365.com
      - MAIL_PORT=587
      - MAIL_USERNAME=pir.maintenance@gdn-commerce.com
      - MAIL_PASSWORD=${MAIL_PASSWORD:-tywwbswpctnhrjsr}
      - MAIL_ENCRYPTION=tls
      - MAIL_FROM_ADDRESS=pir.maintenance@gdn-commerce.com
      - MAIL_FROM_NAME=Warehouse Maintenance
    volumes:
      - ./app:/var/www/html/app
      - ./routes:/var/www/html/routes
      - ./resources:/var/www/html/resources
      - ./config:/var/www/html/config
      - ./database:/var/www/html/database
      - ./bootstrap/app.php:/var/www/html/bootstrap/app.php
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - warehouse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # MySQL Database
  # ===========================================
  db:
    image: mysql:8.0
    container_name: warehouse-db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "2"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-warehouse_maintenance}
      MYSQL_USER: ${DB_USERNAME:-warehouse_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    ports:
      - "3306:3306"
    networks:
      - warehouse-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================
  # Redis Cache & Session
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: warehouse-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    volumes:
      - redis-data:/data
    # Port 6379 only accessible within Docker network, not exposed to host
    # Uncomment below if you need external access to Redis
    # ports:
    #   - "6379:6379"
    networks:
      - warehouse-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Queue Worker (for background jobs)
  # ===========================================
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehouse-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "2"
    environment:
      - APP_NAME=Warehouse Maintenance
      - APP_ENV=production
      - APP_KEY=${APP_KEY:-base64:vlbgy3dM01TbMX3KnZ0hNBPJCQ4ft2+Q85Q0HGQ0TVQ=}
      - APP_DEBUG=false
      - APP_URL=https://warehouse-maintenance.gdn-app.com
      - APP_TIMEZONE=Asia/Jakarta
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-warehouse_maintenance}
      - DB_USERNAME=${DB_USERNAME:-warehouse_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - CENTRAL_DB_DATABASE=${CENTRAL_DB_DATABASE:-warehouse_central}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp.office365.com
      - MAIL_PORT=587
      - MAIL_USERNAME=pir.maintenance@gdn-commerce.com
      - MAIL_PASSWORD=${MAIL_PASSWORD:-tywwbswpctnhrjsr}
      - MAIL_ENCRYPTION=tls
      - MAIL_FROM_ADDRESS=pir.maintenance@gdn-commerce.com
      - MAIL_FROM_NAME=Warehouse Maintenance
    volumes:
      - ./app:/var/www/html/app
      - ./routes:/var/www/html/routes
      - ./resources:/var/www/html/resources
      - ./config:/var/www/html/config
      - ./database:/var/www/html/database
      - ./bootstrap/app.php:/var/www/html/bootstrap/app.php
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'queue:work' | grep -v grep"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - app
      - db
      - redis
    networks:
      - warehouse-network

  # ===========================================
  # Scheduler (for cron jobs)
  # ===========================================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehouse-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "2"
    environment:
      - APP_NAME=Warehouse Maintenance
      - APP_ENV=production
      - APP_KEY=${APP_KEY:-base64:vlbgy3dM01TbMX3KnZ0hNBPJCQ4ft2+Q85Q0HGQ0TVQ=}
      - APP_DEBUG=false
      - APP_URL=https://warehouse-maintenance.gdn-app.com
      - APP_TIMEZONE=Asia/Jakarta
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-warehouse_maintenance}
      - DB_USERNAME=${DB_USERNAME:-warehouse_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - CENTRAL_DB_DATABASE=${CENTRAL_DB_DATABASE:-warehouse_central}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp.office365.com
      - MAIL_PORT=587
      - MAIL_USERNAME=pir.maintenance@gdn-commerce.com
      - MAIL_PASSWORD=${MAIL_PASSWORD:-tywwbswpctnhrjsr}
      - MAIL_ENCRYPTION=tls
      - MAIL_FROM_ADDRESS=pir.maintenance@gdn-commerce.com
      - MAIL_FROM_NAME=Warehouse Maintenance
    volumes:
      - ./app:/var/www/html/app
      - ./routes:/var/www/html/routes
      - ./resources:/var/www/html/resources
      - ./config:/var/www/html/config
      - ./database:/var/www/html/database
      - ./bootstrap/app.php:/var/www/html/bootstrap/app.php
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'schedule:run' | grep -v grep || true"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - app
      - db
      - redis
    networks:
      - warehouse-network

# ===========================================
# Networks
# ===========================================
networks:
  warehouse-network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
  app-storage:
    driver: local
  app-logs:
    driver: local
  nginx-logs:
    driver: local
